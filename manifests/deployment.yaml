apiVersion: apps/v1
kind: Deployment
metadata:
  name: influxdb
  namespace: compute-resources-area-calidad-dev
spec:
  replicas: 1
  selector:
    matchLabels:
      app: influxdb
  template:
    metadata:
      labels:
        app: influxdb
    spec:
      containers:
        - name: influxdb
          image: influxdb:3.9.0-core
          args:
            - influxdb3
            - serve
            - --node-id
            - influxdb
            - --object-store
            - file
            - --data-dir
            - /var/lib/influxdb3/data
            - --admin-token-file
            - /etc/influxdb3/admin-token/admin-token.json
          ports:
            - containerPort: 8181
          env:
            - name: INFLUXDB3_LOG_FILTER
              value: info
          volumeMounts:
            - name: influxdb-data
              mountPath: /var/lib/influxdb3/data
            - name: influxdb-admin-token
              mountPath: /etc/influxdb3/admin-token
              readOnly: true
      volumes:
        - name: influxdb-data
          emptyDir: {}
        - name: influxdb-admin-token
          secret:
            secretName: influxdb-admin-token
---
apiVersion: v1
kind: Secret
metadata:
  name: influxdb-admin-token
  namespace: compute-resources-area-calidad-dev
type: Opaque
stringData:
  token: apiv3_z6XfweFMd3rNML1ixCdvaEkfnQAO-tzC
  admin-token.json: |
    {
      "token": "apiv3_z6XfweFMd3rNML1ixCdvaEkfnQAO-tzC",
      "name": "k6_admin",
      "description": "Admin token for InfluxDB 3 Core on Kubernetes"
    }
---
apiVersion: batch/v1
kind: Job
metadata:
  name: influxdb-init-k6
  namespace: compute-resources-area-calidad-dev
spec:
  backoffLimit: 6
  ttlSecondsAfterFinished: 300
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: create-k6-database
          image: influxdb:3.9.0-core
          command:
            - influxdb3
            - create
            - database
            - k6
          env:
            - name: INFLUXDB3_HOST_URL
              value: http://influxdb:8181
            - name: INFLUXDB3_AUTH_TOKEN
              valueFrom:
                secretKeyRef:
                  name: influxdb-admin-token
                  key: token
